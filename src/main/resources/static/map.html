<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>位置共有マップ</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin: 0; font-family: sans-serif; background: #f5f7fa; }

    header {
      background: #4f46e5;
      color: white;
      padding: 12px;
      text-align: center;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      background: white;
    }

    input, button, select {
      flex: 1;
      min-width: 45%;
      padding: 8px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
    }

    label {
      width: 100%;
      font-size: 13px;
    }

    #map {
      height: calc(100vh - 140px);
      width: 100%;
    }

    @media (min-width: 768px) {
      input, button, select {
        min-width: 120px;
        flex: none;
      }
      .controls {
        justify-content: center;
      }
    }
  </style>
</head>

<body>

<header>📍 位置共有アプリ</header>

<div class="controls">
  <input id="userId" placeholder="名前">

  <!-- ⭐ 手入力禁止 -->
  <input id="groupId" placeholder="グループID" readonly>

  <button onclick="generateGroupId()">ID生成</button>
  <button onclick="copyInviteLink()">招待リンク</button>

  <input id="destination" placeholder="目的地">
  <button onclick="setDestination()">ルート</button>

  <select id="mode">
    <option value="foot">徒歩</option>
    <option value="driving">車</option>
  </select>

  <label>
    <input type="checkbox" id="follow" checked>
    追従
  </label>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ⭐ URLから取得
function getGroupFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("group");
}

// ⭐ 強いID生成
function generateGroupId() {
  const id = crypto.randomUUID().replace(/-/g, '').substring(0, 12);
  document.getElementById("groupId").value = id;
}

// ⭐ 招待リンク
function copyInviteLink() {
  const groupId = document.getElementById("groupId").value;
  const url = location.origin + location.pathname + "?group=" + groupId;
  navigator.clipboard.writeText(url);
  alert("リンクコピーした！");
}

// ⭐ IDチェック
function isValidGroupId(id) {
  return /^[a-zA-Z0-9]{6,20}$/.test(id);
}

// ⭐ マップ
const map = L.map('map').setView([35.6, 139.7], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let markers = [];
let routeLine = null;
let destMarker = null;

// ⭐ 初期ID設定（安全）
const urlGroup = getGroupFromURL();
if (urlGroup && isValidGroupId(urlGroup)) {
  document.getElementById("groupId").value = urlGroup;
} else {
  generateGroupId();
}

// ⭐ 位置送信
function startTracking() {
  navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const userId = document.getElementById("userId").value || "guest";
    const groupId = document.getElementById("groupId").value;

    if (!isValidGroupId(groupId)) return;

    fetch("http://localhost:8080/api/location", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ userId, lat, lng, groupId })
    });

    if (document.getElementById("follow").checked) {
      map.setView([lat, lng], 15);
    }
  });
}

// ⭐ マーカー表示
function loadMarkers() {
  const groupId = document.getElementById("groupId").value;
  const myName = document.getElementById("userId").value || "guest";

  if (!isValidGroupId(groupId)) return;

  fetch(`http://localhost:8080/api/locations?groupId=${groupId}`)
    .then(res => res.json())
    .then(data => {

      markers.forEach(m => map.removeLayer(m));
      markers = [];

      data.forEach(loc => {
        let icon = L.icon({
          iconUrl: loc.userId === myName
            ? "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
            : "https://maps.google.com/mapfiles/ms/icons/red-dot.png",
          iconSize: [32, 32]
        });

        const marker = L.marker([loc.lat, loc.lng], { icon })
          .addTo(map)
          .bindPopup(loc.userId);

        markers.push(marker);
      });
    });
}

// ⭐ 目的地共有
function setDestination() {
  const keyword = document.getElementById("destination").value;
  const groupId = document.getElementById("groupId").value;

  if (!isValidGroupId(groupId)) return;

  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${keyword}`)
    .then(res => res.json())
    .then(data => {
      if (!data.length) return alert("見つからない");

      const lat = parseFloat(data[0].lat);
      const lng = parseFloat(data[0].lon);

      fetch("http://localhost:8080/api/destination", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ groupId, lat, lng })
      });
    });
}

// ⭐ ルート共有
function loadDestination() {
  const groupId = document.getElementById("groupId").value;
  const mode = document.getElementById("mode").value;

  if (!isValidGroupId(groupId)) return;

  navigator.geolocation.getCurrentPosition(pos => {
    const myLat = pos.coords.latitude;
    const myLng = pos.coords.longitude;

    fetch(`http://localhost:8080/api/destination?groupId=${groupId}`)
      .then(res => res.json())
      .then(dest => {
        if (!dest) return;

        if (destMarker) map.removeLayer(destMarker);
        destMarker = L.marker([dest.lat, dest.lng]).addTo(map);

        if (routeLine) map.removeLayer(routeLine);

        fetch(`https://router.project-osrm.org/route/v1/${mode}/${myLng},${myLat};${dest.lng},${dest.lat}?overview=full&geometries=geojson`)
          .then(res => res.json())
          .then(data => {
            const coords = data.routes[0].geometry.coordinates;
            const latlngs = coords.map(c => [c[1], c[0]]);
            routeLine = L.polyline(latlngs, { color: "green" }).addTo(map);
          });
      });
  });
}

// ⭐ 起動
startTracking();
loadMarkers();

setInterval(loadMarkers, 1000);
setInterval(loadDestination, 3000);

</script>

</body>
</html>
